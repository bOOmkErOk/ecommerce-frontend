<div class="checkout-container">
  <div class="billing-section">
    <h2>Billing Details</h2>

    <div class="form">
      <div class="form-group">
        <label>Street Address*</label>
        <input type="text" [(ngModel)]="streetAddress" name="streetAddress" />
      </div>
      <div class="form-group">
        <label>Apartment, floor, etc. (optional)</label>
        <input type="text" [(ngModel)]="apartment" name="apartment" />
      </div>
      <div class="form-group">
        <label>Town/City*</label>
        <input type="text" [(ngModel)]="city" name="city" />
      </div>
      <div class="save-info">
  <input type="checkbox" id="saveInfo" [(ngModel)]="saveInfo" name="saveInfo" />
  <label for="saveInfo">Save this information for faster check-out next time</label>
</div>
    </div>
  </div>

  <div class="order-summary">
    <div *ngIf="isLoading">Loading...</div>

    <ng-container *ngIf="!isLoading && cart">
      <div class="order-items">
        <div *ngFor="let item of cart.items" class="order-item">
          <img [src]="item.product.imageUrl" [alt]="item.product.title" />
          <span>{{ item.product.title }}</span>
          <span>${{ getItemPrice(item.product) * item.quantity | number:'1.2-2' }}</span>
        </div>
      </div>

      <div class="order-totals">
        <div class="total-row">
          <span>Subtotal:</span>
          <span>${{ getSubtotal() | number:'1.2-2' }}</span>
        </div>
        <div class="total-row">
          <span>Shipping:</span>
          <span>Free</span>
        </div>
        <div class="total-row">
          <span>Total:</span>
          <span>${{ getSubtotal() | number:'1.2-2' }}</span>
        </div>
      </div>

      <button 
        class="place-order-btn" 
        (click)="placeOrder()" 
        [disabled]="isPlacingOrder">
        {{ isPlacingOrder ? 'Placing Order...' : 'Place Order' }}
      </button>
    </ng-container>
  </div>
</div>
