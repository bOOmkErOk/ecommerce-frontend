<div class="fill">
  <div class="upper-half">
    <div class="left-side">
      <div class="todays-flash">
        <div class="cube"></div>
        <h3>This Month</h3>
      </div>
      <h2>Best Selling Products</h2>
    </div>
    <div class="right-side">
      <button routerLink="/all-best-selling" >View All</button>
    </div>
  </div>

  <div *ngIf="isLoading">Loading...</div>

  <div class="products-row">
    <app-product-card *ngFor="let product of products" [product]="product" (addToCart)="onAddToCart($event)">
    </app-product-card>
  </div>
</div>
