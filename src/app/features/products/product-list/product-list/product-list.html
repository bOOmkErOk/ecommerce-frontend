<div class="products-container">
  <div class="upper-half">
    <div class="our-products">
      <div class="cube">

      </div>
      <h3>Our Products</h3>
    </div>
    <h1>Explore Our Products</h1>
  </div>

  <div *ngIf="isLoading">Loading...</div>
  <div *ngIf="error" class="error">{{ error }}</div>

  <div class="products-grid">
    <app-product-card *ngFor="let product of products" [product]="product" (addToCart)="onAddToCart($event)">
    </app-product-card>
  </div>
  <div class="button"><button routerLink="/all-products" >View All Products</button></div>
</div>
